<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourVPN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>YourVPN</h1>
    <p>VPN ความเร็วสูง ปลอดภัย และใช้งานง่าย</p>
</header>

<section>
    <h2>จุดเด่นของเรา</h2>

    <div class="card">
        <h3>🔒 ความปลอดภัยสูง</h3>
        <p>ปกป้องข้อมูลของคุณด้วยการเข้ารหัส</p>
    </div>

    <div class="card">
        <h3>⚡ ความเร็วสูง</h3>
        <p>เชื่อมต่อรวดเร็วและเสถียร</p>
    </div>

    <div class="card">
        <h3>🌍 เซิร์ฟเวอร์หลายประเทศ</h3>
        <p>เลือกตำแหน่งเซิร์ฟเวอร์ได้ทั่วโลก</p>
    </div>
</section>

<section>
    <h2>แพ็กเกจ</h2>

    <div class="card">
        <h3>Basic</h3>
        <p>99 บาท / เดือน</p>
    </div>

    <div class="card">
        <h3>Premium</h3>
        <p>199 บาท / เดือน</p>
    </div>
</section>

</body>
</html>
